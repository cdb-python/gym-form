  function wireRecipe(recs, hasPin) {
    var card = document.getElementById("recipeCard");
    if (!card) return;
    if (hasPin && !parentUnlocked) {
      var pinBtn = document.getElementById("rc_pinBtn");
      if (!pinBtn) return;
      var pinInput = document.getElementById("rc_pin_input");
      var pinErr = document.getElementById("rc_pin_err");
      var submit = function () {
        var pin = (pinInput.value || "").trim();
        if (!pin) { pinErr.textContent = "Въведи PIN."; return; }
        pinBtn.disabled = true; pinBtn.textContent = "Проверка…";
        sb.rpc("verify_parent_pin", { token: token, p_pin: pin }).then(function (res) {
          pinBtn.disabled = false; pinBtn.textContent = "Отключи";
          if (res.error) { pinErr.textContent = "Грешка. Опитай пак."; return; }
          if (res.data === true) {
            parentUnlocked = true;
            var body = document.getElementById("recipeBody");
            if (body) { body.innerHTML = recipeBuilderHTML(recs); }
            card.setAttribute("open", "");
            var mark = card.querySelector("summary span:last-child"); if (mark) mark.textContent = "";
            wireRecipeBuilder(recs);
          } else { pinErr.textContent = "Грешен PIN."; pinInput.value = ""; pinInput.focus(); }
        }, function () { pinBtn.disabled = false; pinBtn.textContent = "Отключи"; pinErr.textContent = "Няма връзка."; });
      };
      pinBtn.addEventListener("click", submit);
      pinInput.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });
      return;
    }
    wireRecipeBuilder(recs);
  }

  function wireRecipeBuilder(recs) {
    var card = document.getElementById("recipeCard");
    if (!card) return;
    var nameEl = document.getElementById("rc_name");
    if (!nameEl) return;
    var ingWrap = document.getElementById("rc_ings");
    var addIngBtn = document.getElementById("rc_add_ing");
    var yieldEl = document.getElementById("rc_yield");
    var labelEl = document.getElementById("rc_label");
    var totalEl = document.getElementById("rc_total");
    var perEl = document.getElementById("rc_per");
    var warnEl = document.getElementById("rc_warn");
    var saveEl = document.getElementById("rc_save");
    var okEl = document.getElementById("rc_ok");
    var editId = null;

    function updateTotals() {
      var total = 0, pend = false, any = false;
      ingWrap.querySelectorAll(".ing-row").forEach(function (r) {
        var d = r._data();
        if (d.food_text) { if (!d.inBase) pend = true; else if (d.phe != null) { total += d.phe; any = true; } }
      });
      var y = parseFloat(yieldEl.value) || 1;
      if (!any && !pend) { totalEl.textContent = "–"; perEl.textContent = "–"; warnEl.textContent = ""; return; }
      totalEl.textContent = Math.round(total) + " mg" + (pend ? " +" : "");
      perEl.textContent = Math.round(total / y) + " mg" + (pend ? " +" : "");
      warnEl.textContent = pend ? "Има съставка без стойност — сборът ще се допълни, щом я добавя." : "";
    }

    function addRow(preset) {
      var row = document.createElement("div"); row.className = "ing-row";
      row.innerHTML = '<div class="ac-wrap"><input type="text" class="ing-food" autocomplete="off" placeholder="съставка (напр. Яйце)…"><div class="ac-list"></div></div>'
        + '<div class="ing-line2"><input type="number" class="ing-qty" inputmode="decimal" step="0.5" value="1"><select class="ing-unit"></select><span class="ing-phe">–</span><button type="button" class="ing-del">×</button></div>';
      ingWrap.appendChild(row);
      var foodEl = row.querySelector(".ing-food"), listEl = row.querySelector(".ac-list"),
          qtyEl = row.querySelector(".ing-qty"), unitEl = row.querySelector(".ing-unit"),
          pheEl = row.querySelector(".ing-phe"), delEl = row.querySelector(".ing-del");
      var units = [];
      function findFood(n) { n = (n || "").trim().toLowerCase(); return phedb.find(function (f) { return f.food_name.toLowerCase() === n; }); }
      function unitsFor(n) { n = (n || "").trim().toLowerCase(); return pheunits.filter(function (u) { return u.food_name.toLowerCase() === n; }).sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); }); }
      function refreshUnits(f) { units = f ? unitsFor(f.food_name) : []; unitEl.innerHTML = units.map(function (u, i) { return '<option value="' + i + '">' + esc(u.unit_label) + '</option>'; }).join("") + '<option value="g">г</option>'; }
      function gpu() { if (unitEl.value === "g") return 1; var u = units[parseInt(unitEl.value, 10)]; return u ? u.grams_per_unit : 1; }
      function recompute() {
        var f = findFood(foodEl.value), qty = parseFloat(qtyEl.value);
        if (!f) { pheEl.innerHTML = foodEl.value.trim() ? '<span class="ing-pend">чака ⏳</span>' : "–"; }
        else if (isFinite(qty) && qty > 0) { pheEl.textContent = "≈ " + Math.round(qty * gpu() / 100 * f.phe_mg_per_100g) + " mg"; }
        else pheEl.textContent = "–";
        updateTotals();
      }
      function onFood() { refreshUnits(findFood(foodEl.value)); recompute(); }
      function hide() { listEl.classList.remove("show"); listEl.innerHTML = ""; }
      function show(q) { q = (q || "").trim().toLowerCase(); if (!q) { hide(); return; } var m = phedb.filter(function (f) { return f.food_name.toLowerCase().indexOf(q) !== -1; }).slice(0, 8); if (!m.length) { hide(); return; } listEl.innerHTML = m.map(function (f) { return '<div class="ac-item" data-name="' + esc(f.food_name) + '">' + esc(f.food_name) + '</div>'; }).join(""); listEl.classList.add("show"); }
      listEl.addEventListener("mousedown", function (e) { e.preventDefault(); });
      listEl.addEventListener("click", function (e) { var it = e.target.closest(".ac-item"); if (!it) return; foodEl.value = it.getAttribute("data-name"); hide(); onFood(); });
      foodEl.addEventListener("input", function () { show(foodEl.value); onFood(); });
      foodEl.addEventListener("focus", function () { if (foodEl.value.trim()) show(foodEl.value); });
      foodEl.addEventListener("blur", function () { setTimeout(hide, 120); });
      qtyEl.addEventListener("input", recompute);
      unitEl.addEventListener("change", recompute);
      delEl.addEventListener("click", function () { row.remove(); updateTotals(); });
      refreshUnits(null);
      row._data = function () {
        var f = findFood(foodEl.value), qty = parseFloat(qtyEl.value);
        var g = (isFinite(qty) && qty > 0) ? qty * gpu() : null;
        return { food_text: foodEl.value.trim(), grams: g, inBase: !!f, phe: (f && g != null) ? (g / 100 * f.phe_mg_per_100g) : null };
      };
      if (preset) { foodEl.value = preset.food_text || ""; onFood(); if (preset.grams != null) { unitEl.value = "g"; qtyEl.value = preset.grams; } recompute(); }
      return row;
    }

    function resetBuilder() {
      editId = null; nameEl.value = ""; yieldEl.value = "1"; labelEl.value = "";
      var ie = document.getElementById("rc_instr"); if (ie) ie.value = "";
      ingWrap.innerHTML = ""; addRow(); updateTotals();
      saveEl.textContent = "Запиши рецептата";
    }

    addIngBtn.addEventListener("click", function () { addRow(); });
    yieldEl.addEventListener("input", updateTotals);
    if (!ingWrap.querySelector(".ing-row")) addRow();

    saveEl.addEventListener("click", function () {
      var name = (nameEl.value || "").trim();
      if (!name) { okEl.textContent = "Впиши име на рецептата."; okEl.className = "ok show err"; return; }
      var ings = [];
      ingWrap.querySelectorAll(".ing-row").forEach(function (r) { var d = r._data(); if (d.food_text && d.grams != null) ings.push({ food_text: d.food_text, grams: d.grams }); });
      if (!ings.length) { okEl.textContent = "Добави поне една съставка с количество."; okEl.className = "ok show err"; return; }
      var y = parseFloat(yieldEl.value) || 1;
      var instr = (document.getElementById("rc_instr").value || "").trim();
      saveEl.disabled = true; saveEl.textContent = "Записване…";
      sb.rpc("save_phe_recipe", { token: token, p_name: name, p_yield: y, p_portion_label: (labelEl.value || "").trim(), p_ingredients: ings, p_instructions: instr, p_recipe_id: editId })
        .then(function (res) {
          saveEl.disabled = false;
          if (res.error) throw res.error;
          okEl.textContent = "Записано ✓ — вече я има в търсенето на храни."; okEl.className = "ok show";
          resetBuilder(); reload();
        })
        .catch(function () {
          saveEl.disabled = false; saveEl.textContent = editId ? "Запази промените" : "Запиши рецептата";
          okEl.textContent = "Неуспешно. Опитай пак."; okEl.className = "ok show err";
        });
    });

    card.querySelectorAll(".rc-edit").forEach(function (b) {
      b.addEventListener("click", function () {
        var r = (recs || []).find(function (x) { return String(x.id) === String(b.getAttribute("data-id")); });
        if (!r) return;
        editId = r.id; nameEl.value = r.name; yieldEl.value = r.yield_portions || 1; labelEl.value = r.portion_label || "";
        var ie = document.getElementById("rc_instr"); if (ie) ie.value = r.instructions || "";
        ingWrap.innerHTML = "";
        (r.ingredients || []).forEach(function (g) { addRow({ food_text: g.food_text, grams: g.grams }); });
        if (!ingWrap.querySelector(".ing-row")) addRow();
        saveEl.textContent = "Запази промените"; updateTotals();
        card.setAttribute("open", ""); nameEl.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    });
    card.querySelectorAll(".rc-del").forEach(function (b) {
      b.addEventListener("click", function () {
        if (!confirm("Изтрий тази рецепта?")) return;
        sb.rpc("delete_phe_recipe", { token: token, p_recipe_id: b.getAttribute("data-id") })
          .then(function (res) { if (res.error) throw res.error; reload(); })
          .catch(function () { alert("Неуспешно. Опитай пак."); });
      });
    });
  }

  function reload() {
    Promise.all([
      sb.rpc("get_phe_today", { token: token }),
      sb.rpc("get_phe_log", { token: token, from_date: "2020-01-01" }),   // цялата история (за месечния архив); лентата/днес пак смятат по дата
      sb.rpc("get_blood_trend", { token: token }),
      sb.rpc("get_pending_foods", { token: token }),
      sb.rpc("get_phe_recipes", { token: token }),
      sb.rpc("get_phe_events", { token: token })
    ]).then(function (results) {
      var todayRes = results[0], logRes = results[1], bloodRes = results[2], pendRes = results[3], recRes = results[4], evRes = results[5];
      if (todayRes.error || logRes.error || bloodRes.error) { showState("Възникна грешка при зареждането."); return; }
      recipes = (recRes && recRes.data) || [];
      events = (evRes && evRes.data) || [];
      var todayRow = (todayRes.data && todayRes.data[0]) || { total_mg: 0, daily_target_mg: 350, target_is_provisional: true, percent: 0, color: "green", has_pin: false };
      render(todayRow, logRes.data || [], bloodRes.data || [], (pendRes && pendRes.data) || []);
    }, function () { showState("Няма връзка. Провери интернета и опитай пак."); });
  }

  // Опреснява САМО секциите с данни (лента + лог/чакащи/днес/история) — БЕЗ да разгражда формата
  // „Добави храна" (детето продължава да логва без прекъсване; не губи какво пише).
  function refreshLog() {
    Promise.all([
      sb.rpc("get_phe_log", { token: token, from_date: "2020-01-01" }),
      sb.rpc("get_pending_foods", { token: token })
    ]).then(function (r) {
      var log = (r[0] && r[0].data) || [];
      var pending = (r[1] && r[1].data) || [];
      var bar = document.getElementById("sec_bar");
      var seclog = document.getElementById("sec_log");
      if (bar) bar.innerHTML = renderBar(log);
      if (seclog) seclog.innerHTML = renderPendingFoods(pending) + renderToday(log, todayStr()) + renderHistory(log, todayStr());
    }).catch(function () {});
  }

  Promise.all([
    sb.from("phe_db").select("food_name,phe_mg_per_100g,category,note,unit_grams,unit_label,is_measured"),
    sb.from("phe_units").select("food_name,unit_label,grams_per_unit,sort_order")
  ]).then(function (results) {
    if (!results[0].error && results[0].data) phedb = results[0].data;
    if (!results[1].error && results[1].data) pheunits = results[1].data;
    reload();
  }, function () { reload(); });
})();
</script>
</body>
</html>
