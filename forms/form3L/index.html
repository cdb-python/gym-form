<script>
(function () {
  // Токенът се пази локално → инсталираното приложение (start_url без токен) сам се връща на личния лог.
  try {
    var t = new URLSearchParams(location.search).get("t");
    if (t) { localStorage.setItem("cdbgym_f3l_token", t); }
    else {
      var saved = localStorage.getItem("cdbgym_f3l_token");
      if (saved) { location.replace(location.pathname + "?t=" + saved); return; }
    }
  } catch (e) {}
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7886;
    --accent: #129e90;
    --accent-dark: #085c54;
    --border: #d8dee5;
    --soft: #eef4f1;
    --gold: #b8862f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    padding: 0 0 40px;
    overflow-x: hidden;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 22px 18px 18px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; font-size: 15px; opacity: 0.92; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .sec { margin: 20px 0 6px; }
  .sec h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent-dark);
    margin: 0 0 8px;
    padding-left: 2px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 0 0 12px;
  }
  .card .t { font-weight: 700; font-size: 16px; margin: 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .card .t::after { content: "▸"; color: var(--accent); font-size: 14px; flex: none; }
  .card.open .t::after { content: "▾"; }
  /* обединен хедър: зелен етикет (ляво) + черен тайтъл (дясно) на един ред */
  .card .t .lbl { color: var(--accent-dark); font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; flex: none; }
  .card .t .ttl { color: var(--ink); font-size: 13.5px; font-weight: 700; flex: 1; text-align: right; }
  .card.lf .t .lbl { text-transform: none; letter-spacing: 0; font-size: 14px; }
  .card.lf .t .note { color: var(--muted); font-size: 10.5px; font-weight: 600; flex: none; margin-left: auto; text-align: right; white-space: nowrap; }
  .card.lf .t::after { display: none; }
  .card .date { font-size: 13px; color: var(--muted); font-weight: 600; margin: 0 0 4px; }
  .card .body { font-size: 15.5px; margin-top: 8px; display: none; }
  .card.open .body { display: block; }
  .card .body p { margin: 0 0 8px; }
  .card .body p:last-child { margin-bottom: 0; }
  .card .body ul { margin: 6px 0; padding-left: 20px; }
  .card .body li { margin: 0 0 5px; }
  .card .body h4 { margin: 14px 0 5px; font-size: 15px; color: var(--accent-dark); }
  .card .body .cta { margin-top: 12px; font-style: italic; color: var(--accent-dark); }

  /* Прогрес + награда */
  .progress {
    background: var(--accent-dark); color: #fff; border-radius: 12px;
    padding: 13px 15px; margin: 18px 0 12px;
  }
  .progress .sub { font-size: 13.5px; opacity: 0.9; margin-top: 9px; text-align: center; }
  /* прогрес-скала на ЕДИН ред: label + 15 гъвкави сегмента + число */
  .dayscale { display: flex; align-items: center; gap: 8px; }
  .dayscale .dlbl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; opacity: 0.9; white-space: nowrap; flex: none; }
  .dayscale .segs { display: flex; gap: 2px; flex: 1; min-width: 0; }
  .dayscale .segs > i { flex: 1; height: 15px; border-radius: 2px; background: rgba(255,255,255,0.20); }
  .dayscale .segs > i.on { background: #fff; }
  .dayscale .num { font-size: 14px; font-weight: 800; white-space: nowrap; flex: none; }
  /* наградата вградена ВЪТРЕ в прогрес картата (под бара, тънък разделител, златист акцент) */
  .progress .reward-in {
    margin-top: 13px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.22);
    font-size: 13px; line-height: 1.5; opacity: 0.96;
  }
  .progress .reward-in b { color: #ffd98a; font-weight: 700; }
  .intro {
    background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: 12px; padding: 14px 16px; margin: 0 0 10px; font-size: 14.5px;
  }
  .intro p { margin: 0 0 8px; }
  .intro p:last-child { margin-bottom: 0; }
  .intro .lead { color: var(--accent-dark); }
  .muted2 { color: var(--muted); font-size: 13.5px; margin: 0 0 12px; }
  .drip { color: var(--muted); font-size: 13px; text-align: center; margin: 2px 0 0; }

  /* Лог форма */
  .lf label { display: block; font-weight: 600; font-size: 14px; margin: 12px 0 4px; }
  .lf textarea, .lf input {
    width: 100%; padding: 11px 12px; font-size: 16px; border: 1px solid var(--border);
    border-radius: 9px; font-family: inherit; color: var(--ink); background: #fff;
  }
  .lf textarea { min-height: 170px; resize: vertical; }
  .lf .hint { color: var(--muted); font-size: 13px; margin: 3px 0 0; }
  .lf button {
    width: 100%; margin-top: 14px; padding: 13px; font-size: 16px; font-weight: 700;
    color: #fff; background: var(--accent); border: none; border-radius: 10px; cursor: pointer;
  }
  .lf button:active { background: var(--accent-dark); }
  .lf button.ghost { background: #fff; color: var(--accent-dark); border: 1px solid var(--accent); }
  .lf .ok { display: none; margin-top: 10px; padding: 10px 12px; background: #e6f4ec; border: 1px solid #b7dcc6; border-radius: 9px; color: var(--accent-dark); font-size: 14px; text-align: center; }
  .lf .ok.show { display: block; }
  .lf .err { background: #fdecec; border-color: #f3c2c2; color: #9a3b3b; }


  /* Потвърждение */
  .confirm { display: none; margin-top: 12px; padding: 13px 14px; background: var(--soft); border: 1px solid #bcd9c9; border-radius: 10px; }
  .confirm.show { display: block; }
  .confirm .q { font-weight: 700; color: var(--accent-dark); margin: 0 0 8px; }
  .confirm .what { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; font-size: 15px; margin: 0 0 10px; word-break: break-word; }
  .confirm .what .w { color: var(--accent-dark); font-weight: 600; }
  .confirm .row2 { display: flex; gap: 10px; }
  .confirm .row2 button { margin-top: 0; flex: 1; }

  /* История по ден */
  .logitem { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14.5px; }
  .logitem:last-child { border-bottom: none; }
  .logitem .tm { color: var(--muted); font-size: 13px; margin-right: 6px; }
  .logitem .wt { color: var(--accent-dark); font-weight: 600; }
  .daycount { color: var(--muted); font-weight: 600; font-size: 13px; }

  .state { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px 18px; margin: 22px 0; text-align: center; color: var(--muted); font-size: 15.5px; }
  .loading { text-align: center; color: var(--muted); padding: 30px 0; }

  /* Банер за ново съобщение (стики горе) */
  .cbanner {
    position: sticky; top: 0; z-index: 6;
    background: var(--gold); color: #fff; text-align: center;
    padding: 11px 14px; font-size: 14.5px; font-weight: 700; cursor: pointer;
    border-radius: 0 0 10px 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  /* Карта „Съобщение от Chris" (зелен ляв акцент; сгъваема — най-новата отворена) */
  .card.coachmsg { border-left: 4px solid var(--accent); background: var(--soft); }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 4px;">
    <h1>Хранителен лог — 15 дни</h1>
    <p id="who">&nbsp;</p>
  </div>
</header>

<div class="wrap">
  <div class="loading" id="loading">Зарежда…</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SB_URL = "https://ankqnxqxrhonlffhxabn.supabase.co";
  var SB_KEY = "sb_publishable_4UGeheRP-noXzmxP5tuthg_dfeeMPDd";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);
  var WINDOW_DAYS = 15;

  var loading = document.getElementById("loading");
  var content = document.getElementById("content");
  var who = document.getElementById("who");

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }
  function fmtDate(s) {
    if (!s) return "";
    var p = String(s).split("-");
    return p.length === 3 ? (p[2] + "." + p[1] + "." + p[0]) : s;
  }
  function fmtTime(s) {
    if (!s) return "";
    try {
      return new Date(s).toLocaleTimeString("bg-BG", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Sofia" });
    } catch (e) { return ""; }
  }
  function todayStr() {
    try {
      var p = new Date().toLocaleDateString("en-CA", { timeZone: "Europe/Sofia" });
      return p; // YYYY-MM-DD
    } catch (e) { return new Date().toISOString().slice(0, 10); }
  }
  function dayDiff(a, b) {
    var da = new Date(a + "T00:00:00"), db = new Date(b + "T00:00:00");
    return Math.round((db - da) / 86400000);
  }
  function showState(msg) {
    loading.style.display = "none";
    content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
  }

  function entryLine(e) {
    var tm = fmtTime(e.created_at);
    var parts = [];
    if (e.text) parts.push(esc(e.text));
    if (e.weight != null && e.weight !== "") parts.push('<span class="wt">⚖ ' + esc(e.weight) + " кг</span>");
    return '<div class="logitem' + (e.text ? " food" : "") + '"><span class="tm">' + esc(tm) + "</span>" + parts.join(" · ") + "</div>";
  }

  function dayLabel(dStr, today) {
    var d = dayDiff(dStr, today);
    if (d === 0) return "Днес";
    if (d === 1) return "Вчера";
    return fmtDate(dStr);
  }

  function renderHistory(entries, today) {
    if (!entries.length) return '<p style="color:#6b7886;font-size:14px">Още няма записи. Първото, което хапнеш или пиеш днес — впиши го горе.</p>';
    // групиране по ден (entries вече са created_at desc → дните идват най-нови първи)
    var order = [], groups = {};
    entries.forEach(function (e) {
      var k = e.entry_date || "—";
      if (!groups[k]) { groups[k] = []; order.push(k); }
      groups[k].push(e);
    });
    var html = "";
    order.forEach(function (k, i) {
      var arr = groups[k];
      var lbl = dayLabel(k, today);
      var dc = '<span class="daycount">' + arr.length + (arr.length === 1 ? " запис" : " записа") + "</span>";
      // зеленият етикет „Моят лог" влиза САМО в първата (най-нова) дневна карта
      var head = (i === 0)
        ? '<span class="lbl">Моят лог</span><span class="ttl">' + esc(lbl) + "</span>" + dc
        : esc(lbl) + " " + dc;
      html += '<div class="card' + (i === 0 ? " open" : "") + '" data-key="day_' + esc(k) + '">'
        + '<div class="t">' + head + "</div>"
        + '<div class="body">' + arr.map(entryLine).join("") + "</div></div>";
    });
    return html;
  }

  function renderCoach(msgs) {
    var sorted = msgs.slice().sort(function (a, b) { return String(b.created_at || "").localeCompare(String(a.created_at || "")); });
    var cards = sorted.map(function (m, i) {
      var dStr = m.entry_date || (m.created_at ? String(m.created_at).slice(0, 10) : "");
      var body = esc(m.text).replace(/\n/g, "<br>");
      // само най-новото (i===0) е отворено; старите са затворени отдолу
      return '<div class="card coachmsg' + (i === 0 ? " open" : "") + '">'
        + '<div class="t"><span class="lbl">Съобщение от Chris</span><span class="ttl">' + esc(fmtDate(dStr)) + "</span></div>"
        + '<div class="body"><p>' + body + "</p></div>"
        + "</div>";
    }).join("");
    return '<div class="sec" id="coachSec">' + cards + "</div>";
  }

  function render(data) {
    loading.style.display = "none";
    if (data.name) who.textContent = data.name;
    var allEntries = data.entries || [];
    var coachMsgs = allEntries.filter(function (e) { return e.kind === "coach"; });
    var entries = allEntries.filter(function (e) { return e.kind !== "coach"; }); // само храна-записи
    var today = todayStr();

    // прогрес = записани дни (различни дати с поне един храна-запис)
    var distinct = {};
    entries.forEach(function (e) { if (e.entry_date) distinct[e.entry_date] = 1; });
    var loggedDays = Object.keys(distinct).length;
    var done = loggedDays >= WINDOW_DAYS;
    var pct = Math.min(100, Math.round((loggedDays / WINDOW_DAYS) * 100));

    // наградата е вградена ВЪТРЕ в прогрес картата (под бара) — само докато логът тече
    var rewardLine = '<div class="reward-in">🎁 Накрая те чака <b>задълбочен личен разбор на храненето ти</b> — какво то реално означава за тялото ти, къде си силен и къде е слабото звено. Всичко измерено от твоите реални дни.</div>';

    // 15-сегментна скала (попълва се с записаните дни) на един ред
    var segs = "";
    for (var si = 0; si < WINDOW_DAYS; si++) segs += '<i class="' + (si < loggedDays ? "on" : "") + '"></i>';
    var scaleHtml = '<div class="dayscale"><span class="dlbl">Прогрес</span>'
      + '<span class="segs">' + segs + '</span>'
      + '<span class="num">' + (done ? "15/15 ✓" : (loggedDays + "/15")) + '</span></div>';

    var progressHtml;
    if (done) {
      progressHtml = '<div class="progress">' + scaleHtml
        + '<div class="sub">Картината ти е готова — анализът идва скоро.</div></div>';
    } else {
      progressHtml = '<div class="progress">' + scaleHtml + rewardLine + '</div>';
    }

    var infoHtml = '<div class="sec">'
      + '<div class="card" data-key="info"><div class="t"><span class="lbl">За лога</span><span class="ttl">Какво е това и защо работи</span></div><div class="body">'
      + "<p>Този лог е инструмент за <b>точно измерване</b> на реалните ти калории и макроси (белтъци, въглехидрати, мазнини) — на база как се храниш в истинския живот. Без общи формули и предположения; тук се мери <b>реалността</b>.</p>"
      + "<h4>Защо е нужно точно измерване?</h4>"
      + "<p>Формулите за калории (Harris-Benedict, Mifflin-St Jeor и др.) дават ориентировъчна стойност. Те описват <b>среден човек</b> и не отчитат важни индивидуални разлики:</p>"
      + "<ul><li>какъв е реалният ти метаболизъм;</li>"
      + "<li>каква част от храната усвояваш;</li>"
      + "<li>хормонален статус, възраст, история на теглото, мускулна маса;</li>"
      + "<li>ежедневно движение (NEAT) и навици.</li></ul>"
      + "<p>Затова при много хора формулата греши и не дава точните калории за деня. Налага се период на следене и корекции, докато се стигне до калориите, при които тялото ти стои стабилно.</p>"
      + "<h4>Как работи методът?</h4>"
      + "<p>Най-точният начин да разбереш <b>поддръжката</b> си (калориите, при които теглото остава стабилно) е наблюдение:</p>"
      + "<ul><li>записваш всичко, което ядеш и пиеш — нужни са поне <b>15 записани дни</b> (делник + уикенд); пропуснат ден не се брои;</li>"
      + "<li>следиш теглото при еднакви условия (сутрин, след тоалетна, преди храна);</li>"
      + "<li>накрая данните се анализират — средни калории и макроси и как теглото е реагирало.</li></ul>"
      + "<p>Това дава <b>измерена, а не пресметната</b> стойност за тялото ти. Логът хваща реалните порции, сосовете, „малките хапки“, напитките и разликите между дните — нещата, които формулите и еднодневните записи пропускат.</p>"
      + "<h4>Какво получаваш накрая?</h4>"
      + "<ul><li>точните си средни дневни калории и разпределение на макросите;</li>"
      + "<li>анализ на любимите ти храни и хранителни навици;</li>"
      + "<li>къде имаш недостиг или излишък — твърде малко протеин, твърде много мазнини или захар, празни калории, малко зеленчуци и плодове;</li>"
      + "<li>обективна картина на текущото ти хранене;</li>"
      + "<li>конкретни препоръки какво да коригираш, за да сваляш, качваш или поддържаш тегло.</li></ul>"
      + "<p>Оттам избираш:</p>"
      + "<ul><li><b>пълен персонализиран режим</b>, изграден върху твоите храни и предпочитания — най-устойчивият вариант;</li>"
      + "<li>или само <b>корекции и насоки</b>.</li></ul>"
      + "<h4>Поверителност и честност</h4>"
      + "<p>Логът е <b>100% личен</b> — виждаш го само ти, през таен линк, само с първото ти име. Колкото по-честно и подробно записваш (дори „лошите“ дни), толкова по-точна и полезна е крайната картина.</p>"
      + "<p>Методът не е нов — това е <b>златният стандарт</b>, който нутриционистите и треньорите ползват, когато искат реални резултати, а не приблизителни. Разликата е, че тук го правиш удобно и структурирано, с последващ професионален анализ.</p>"
      + '<p class="cta"><b>Готов ли си да видиш какво всъщност се случва в храненето ти?</b></p>'
      + "</div></div></div>";

    var formHtml = '<div class="sec">'
      + '<div class="card open lf"><div class="t" style="cursor:default;pointer-events:none"><span class="lbl">Какво хапна и пи?</span><span class="note">Празен ден не се брои</span></div>'
      + '<div class="body" style="display:block">'
      + '<textarea id="f_text" placeholder="напр.: половин кофичка кисело мляко 4% + 2 лъжици мед · 1 филия с масло · пържола колкото длан + порция пържени · кафе с 2 бучки захар"></textarea>'
      + '<p class="hint">Опиши с <b>количество + вид</b> — лъжица, чаша, кофичка, шепа, длан, на части (половин/четвърт). Везна не трябва. Кажеш ли марка или % масленост — още по-точно. Пиши и дребното: сос, захар в кафето, олио.</p>'
      + '<label>Тегло (кг)</label>'
      + '<input type="number" id="f_weight" inputmode="decimal" step="0.1" placeholder="напр. 84.2">'
      + '<p class="hint">Сутрин на гладно, след тоалетна, при еднакви условия. Най-добре всеки ден, минимум през ден — теглото е <b>проверката</b> на лога.</p>'
      + '<button type="button" id="saveBtn">Запиши</button>'
      + '<div class="confirm" id="confirm"><p class="q">Верни ли са храните и количествата?</p>'
      + '<div class="what" id="confirmWhat"></div>'
      + '<div class="row2"><button type="button" class="ghost" id="editBtn">Поправи</button>'
      + '<button type="button" id="confirmBtn">Потвърди</button></div></div>'
      + '<div class="ok" id="okMsg"></div>'
      + '</div></div></div>';

    var guideHtml = '<div class="sec">'
      + '<div class="card" data-key="guide"><div class="t"><span class="lbl">Как се логва</span><span class="ttl">Подробно ръководство</span></div><div class="body">'
      + "<p><b>1. Логвай всичко.</b> Всяка хапка, глътка, сос, захар в кафето, олио в готвенето, алкохол. Забравените неща изкривяват картината.</p>"
      + "<p><b>2. Пиши с количество + вид</b> — колкото можеш да прецениш:</p>"
      + "<ul><li>„половин кофичка кисело мляко 4%“ — не само „кисело мляко“</li>"
      + "<li>„2 лъжици мед“ · „1 филия хляб + масло колкото за намазване“</li>"
      + "<li>„пържола колкото дланта + 1 порция пържени“</li>"
      + "<li>„чаша вино“ · „шепа бадеми“ · „кафе + 2 бучки захар“</li></ul>"
      + "<p>Мери с <b>домакински мерки</b>: лъжица, чаша, кофичка, шепа, длан, на части (половин/четвърт). Везна не трябва. Кажеш ли марката или % масленост — сметката е по-точна.</p>"
      + "<p><b>3. Тегло:</b> сутрин на гладно, едно число. Всеки ден (или поне през ден) — колкото повече, толкова по-точно.</p>"
      + "<p><b>4. Поправка.</b> Преди всеки запис излиза проверка „потвърди / поправи“ — там оправяш. След запис не се трие (за честна картина); сбъркаш ли все пак, добави нов ред „поправка: …“.</p>"
      + "<p><b>5. Пиши честно — тук няма грешно.</b> Реалната картина зависи изцяло от това.</p>"
      + "<p><b>6. Нужни са 15 записани дни.</b> За да се извади анализът — реалните ти калории, макроси и хранителни навици — трябват поне 15 дни с лог на храна.</p>"
      + "<p><b>7. Кога се сменя денят.</b> Денят в лога върви по <b>българско време</b> и се завърта в <b>полунощ (00:00)</b>. Всичко, което впишеш до 23:59, влиза в текущия ден; първото нещо след полунощ започва новия ден. Часът на всеки запис се запазва автоматично — не го въвеждаш ти. Затова е добре да вписваш храната веднага щом я хапнеш (или поне преди полунощ), за да попадне в правилния ден.</p>"
      + "</div></div></div>";

    var histHtml = '<div class="sec"><div id="histList">'
      + renderHistory(entries, today) + "</div></div>";

    // съобщения от Chris + банер за непрочетено
    var latestCoachAt = "";
    coachMsgs.forEach(function (m) { var c = String(m.created_at || ""); if (c > latestCoachAt) latestCoachAt = c; });
    // последна КЛИЕНТСКА активност (храна/тегло) — ако е писала СЛЕД съобщението, видяла го е
    var lastClientAt = "";
    entries.forEach(function (e) { var c = String(e.created_at || ""); if (c > lastClientAt) lastClientAt = c; });
    var bannerHtml = "", coachHtml = "";
    if (coachMsgs.length) {
      coachHtml = renderCoach(coachMsgs);
      var seen = "";
      try { seen = localStorage.getItem("f3l_seen_coach_" + token) || ""; } catch (e) {}
      // банер само ако съобщението е по-ново от последната ѝ активност И не е видяно на това устройство
      if (latestCoachAt > lastClientAt && latestCoachAt > seen) {
        bannerHtml = '<div class="cbanner" id="cbanner">✉ Имате ново съобщение — докосни да прочетеш</div>';
      }
    }

    // банерът е горе (стики); самите съобщения са НАЙ-ДОЛУ — банерът скролва до тях
    content.innerHTML = bannerHtml + progressHtml + formHtml + histHtml + infoHtml + guideHtml + coachHtml;
    // NB: wireAccordion() НЕ тук — закача се ВЕДНЪЖ на init (делегация на content). Иначе всеки render трупа листенер → toggle×N → картите „не се отварят" при първо зареждане (поправено 30.06).

    wireForm(data, today);
    wireCoach(latestCoachAt);
  }

  function wireCoach(latestAt) {
    var banner = document.getElementById("cbanner");
    if (!banner) return;
    banner.addEventListener("click", function () {
      var sec = document.getElementById("coachSec");
      if (sec) sec.scrollIntoView({ behavior: "smooth", block: "start" });
      try { localStorage.setItem("f3l_seen_coach_" + token, latestAt); } catch (e) {}
      banner.style.display = "none";
    });
  }

  function wireForm(data, today) {
    var textEl = document.getElementById("f_text");
    var wEl = document.getElementById("f_weight");
    var saveBtn = document.getElementById("saveBtn");
    var confirm = document.getElementById("confirm");
    var confirmWhat = document.getElementById("confirmWhat");
    var editBtn = document.getElementById("editBtn");
    var confirmBtn = document.getElementById("confirmBtn");
    var okMsg = document.getElementById("okMsg");

    // Последно въведено тегло (за проверка на рязка разлика). entries са created_at desc.
    var lastWeight = null;
    var lastWeightWarn = false;  // имаше ли предупреждение за теглото при последния „Запиши"
    (data.entries || []).filter(function (e) { return e.kind !== "coach"; }).some(function (e) {
      if (e.weight != null && e.weight !== "") { lastWeight = parseFloat(e.weight); return true; }
      return false;
    });
    function weightWarning(wStr) {
      if (!wStr) return null;
      var x = parseFloat(String(wStr).replace(",", "."));
      if (!isFinite(x)) return null;
      if (x < 30 || x > 250) return "Тегло " + wStr + " кг изглежда необичайно — провери да не е печатна грешка.";
      // процентен праг (скалира с теглото): ≥8% разлика, но поне 4 кг — лови и по-леки хора
      if (lastWeight != null) {
        var thr = Math.max(4, 0.08 * lastWeight);
        if (Math.abs(x - lastWeight) >= thr)
          return "Теглото " + x + " кг се различава с " + Math.abs(x - lastWeight).toFixed(1) + " кг от последното (" + lastWeight + " кг) — сигурна ли си, че е вярно?";
      }
      return null;
    }

    // примерният текст изчезва веднага при фокус/клик; връща се ако полето остане празно
    var textPH = textEl.getAttribute("placeholder");
    textEl.addEventListener("focus", function () { textEl.setAttribute("placeholder", ""); });
    textEl.addEventListener("blur", function () { if (!textEl.value) textEl.setAttribute("placeholder", textPH); });

    function msg(t, isErr) {
      okMsg.textContent = t;
      okMsg.className = "ok show" + (isErr ? " err" : "");
    }
    function clearMsg() { okMsg.className = "ok"; }

    saveBtn.addEventListener("click", function () {
      var t = textEl.value.trim();
      var w = wEl.value.trim();
      if (!t && !w) { msg("Впиши храна или тегло.", true); return; }
      clearMsg();
      var bits = [];
      if (t) bits.push(esc(t));
      if (w) bits.push('<span class="w">⚖ ' + esc(w) + " кг</span>");
      var wWarn = weightWarning(w);
      lastWeightWarn = !!wWarn;
      if (wWarn) bits.push('<span style="color:#8a5a00;font-weight:700;">⚠ ' + esc(wWarn) + "</span>");
      confirmWhat.innerHTML = bits.join("<br>");
      confirm.classList.add("show");
      saveBtn.style.display = "none";
    });

    editBtn.addEventListener("click", function () {
      confirm.classList.remove("show");
      saveBtn.style.display = "";
      // курсорът отива на полето за корекция: теглото при предупреждение за тегло, иначе храната.
      // нищо не се нулира — стойностите остават за поправка.
      (lastWeightWarn ? wEl : textEl).focus();
    });

    confirmBtn.addEventListener("click", function () {
      var t = textEl.value.trim();
      var w = wEl.value.trim();
      var weight = w ? parseFloat(w) : null;
      confirmBtn.disabled = true; confirmBtn.textContent = "Записване…";
      sb.rpc("add_food_entry", { p_token: token, p_text: t || null, p_weight: weight })
        .then(function (res) {
          if (res.error || res.data === false) throw (res.error || new Error("fail"));
          // оптимистично добавяне в списъка
          var rec = { text: t || null, weight: weight, entry_date: today, created_at: new Date().toISOString() };
          var list = document.getElementById("histList");
          var firstDay = list.querySelector('.card[data-key="day_' + today + '"]');
          if (firstDay) {
            var body = firstDay.querySelector(".body");
            body.insertAdjacentHTML("afterbegin", entryLine(rec));
            var dc = firstDay.querySelector(".daycount");
            var n = body.querySelectorAll(".logitem").length;
            if (dc) dc.textContent = n + (n === 1 ? " запис" : " записа");
          } else {
            if (!list.querySelector(".card")) list.innerHTML = "";
            // новата дневна карта става първа → взима зеления етикет „Моят лог" от старата първа
            var prevLbl = list.querySelector(".card .t .lbl");
            if (prevLbl) prevLbl.remove();
            list.insertAdjacentHTML("afterbegin",
              '<div class="card open" data-key="day_' + esc(today) + '"><div class="t"><span class="lbl">Моят лог</span><span class="ttl">Днес</span><span class="daycount">1 запис</span></div><div class="body">' + entryLine(rec) + "</div></div>");
          }
          textEl.value = ""; wEl.value = "";
          confirm.classList.remove("show");
          saveBtn.style.display = "";
          confirmBtn.disabled = false; confirmBtn.textContent = "Потвърди";
          msg("Записано ✓ Продължавай така.");
        })
        .catch(function () {
          confirmBtn.disabled = false; confirmBtn.textContent = "Потвърди";
          msg("Неуспешно. Опитай пак.", true);
        });
    });
  }

  function wireAccordion() {
    content.addEventListener("click", function (e) {
      if (e.target.closest(".body")) return;
      if (e.target.closest(".lf")) return;
      var card = e.target.closest(".card");
      if (card && !card.classList.contains("lf")) card.classList.toggle("open");
    });
  }

  var token = new URLSearchParams(location.search).get("t");
  if (!token) { showState("Липсва код в линка. Отвори линка, който получи."); return; }

  wireAccordion();  // ВЕДНЪЖ — делегация на content (стабилен), важи за всички текущи/бъдещи карти

  sb.rpc("get_food_log", { p_token: token }).then(function (res) {
    if (res.error) { showState("Възникна грешка при зареждането. Опитай по-късно."); return; }
    if (!res.data) { showState("Линкът е невалиден или вече не е активен."); return; }
    render(res.data);
  }, function () {
    showState("Няма връзка. Провери интернета и опитай пак.");
  });

  // тихо презареждане при връщане на страницата на фокус (нови съобщения изскачат без ръчен рефреш).
  // защита: НЕ презарежда ако потребителят пише или има отворено потвърждение (да не трие въведеното).
  var reloadBusy = false;
  function maybeReload() {
    if (document.visibilityState === "hidden") return;
    var t = document.getElementById("f_text"), w = document.getElementById("f_weight"), conf = document.getElementById("confirm");
    if (t && t.value.trim()) return;
    if (w && w.value.trim()) return;
    if (conf && conf.classList.contains("show")) return;
    if (reloadBusy) return;
    reloadBusy = true;
    sb.rpc("get_food_log", { p_token: token }).then(function (res) {
      reloadBusy = false;
      if (res && !res.error && res.data) render(res.data);
    }, function () { reloadBusy = false; });
  }
  document.addEventListener("visibilitychange", maybeReload);
  window.addEventListener("focus", maybeReload);
})();
</script>
</body>
</html>
