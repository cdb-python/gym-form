<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Твоят анализ</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7886;
    --accent: #5f6a73;
    --accent-dark: #454e56;
    --gold: #b8862f;
    --border: #d8dee5;
    --soft: #eef1f4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    padding: 0 0 40px;
    overflow-x: hidden;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 22px 18px 18px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; font-size: 15px; opacity: 0.92; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .intro {
    color: var(--muted);
    font-size: 14.5px;
    margin: 16px 2px 4px;
    text-align: center;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin: 12px 0 0;
    overflow: hidden;
  }
  .card .t {
    font-weight: 700; font-size: 16px; margin: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 16px; text-align: left; color: #fff; background: var(--accent);
  }
  .card .t::after { content: "+"; flex: none; color: #fff; font-size: 20px; font-weight: 700; }
  .card.open .t::after { content: "\2212"; }
  .card .body { font-size: 15.5px; padding: 14px 16px; display: none; overflow-x: auto; }
  .card.open .body { display: block; }
  .card.l1 .t { background: #c43d3d; }
  .card.l2 .t { background: #34376f; }
  .card.l3 .t { background: #245fb0; }
  .card.l4 .t { background: #129e90; }
  .card.l5 .t { background: #b8862f; }
  .card.lx .t { background: #fff8ec; color: #6a531f; }
  .card.lx .t::after { color: #6a531f; }
  .card.l1 { border-left: 5px solid #c43d3d; }
  .card.l2 { border-left: 5px solid #34376f; }
  .card.l3 { border-left: 5px solid #245fb0; }
  .card.l4 { border-left: 5px solid #129e90; }
  .card.l5 { border-left: 5px solid #b8862f; }
  .card.lx { border-left: 5px solid #8a5a00; }
  /* УВОД — перманентно отворена, извън пирамидата, леко сиво */
  .card.intro .t { background: #e8ebee; color: #454e56; cursor: default; }
  .card.intro .t::after { content: "" !important; }
  .card.intro { border-left-color: #b9c0c7; }
  /* ПРИСЪДА — призрачна по подразбиране (тънък сив аутлайн + сив надпис), отваряема */
  .card.verdict { border: 1px solid #e4e7ea; background: transparent; }
  .card.verdict .t { background: transparent; color: #99a0a7; justify-content: flex-start; }
  .card.verdict .t::after { content: "\2192"; color: #99a0a7; }
  .card.verdict.open { border-color: #5f6a73; background: var(--card); }
  .card.verdict.open .t { background: #5f6a73; color: #fff; }
  .card.verdict.open .t::after { content: "\2192"; color: #fff; }
  /* карта-присъда: изписване (typewriter) — мигащо каре */
  @keyframes twblink { 50% { opacity: 0; } }
  .card.typing .body::after {
    content: "\258C"; color: #5f6a73;
    animation: twblink 1s step-end infinite; margin-left: 1px; font-weight: 700;
  }
  .card .body p { margin: 0 0 8px; }
  .card .body p:last-child { margin-bottom: 0; }
  .card .body table { width: 100%; border-collapse: collapse; table-layout: fixed; margin: 8px 0; font-size: 13.5px; }
  .card .body th, .card .body td { border: 1px solid var(--border); padding: 6px 7px; text-align: left; word-break: break-word; vertical-align: top; }
  .card .body th { background: var(--soft); color: var(--accent-dark); }
  .card .body td:first-child, .card .body th:first-child { width: 40%; }
  .state {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 18px;
    margin: 22px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15.5px;
  }
  .loading { text-align: center; color: var(--muted); padding: 30px 0; }
  footer { text-align: center; color: var(--muted); font-size: 13px; margin: 22px 0 0; }
  .exit { text-align: center; margin: 20px 0 0; }
  .exit p { color: var(--muted); font-size: 14px; margin: 0 0 10px; }
  .pdfbtn {
    display: inline-block; background: #fff; color: var(--accent);
    border: 1.5px solid var(--accent); border-radius: 11px;
    font-weight: 700; font-size: 15px; padding: 11px 18px; cursor: pointer;
  }
  .pdfbtn:active { background: var(--soft); }
  @media print {
    .no-print, .loading, #tw-spacer { display: none !important; }
    .card .body { display: block !important; }
    .card .t { cursor: default; break-after: avoid; }
    .card .t::after { content: "" !important; }
    .card { overflow: visible; border: none; border-radius: 0; box-shadow: none; margin: 0 0 12px; }
    .card .body { break-before: avoid; }
    .card .body table, .card .body tr { break-inside: avoid; }
    footer { break-inside: avoid; }
    body { padding: 0; font-size: 12pt; }
    header, .card .t, .card .body th {
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    a[href] { color: inherit; text-decoration: none; }
  }
  .cert { color: var(--accent); border-bottom: 1px dotted var(--accent); cursor: pointer; font-weight: 700; white-space: nowrap; }
  .cert-pop {
    display: none; position: fixed; z-index: 100;
    width: max-content; max-width: min(320px, calc(100vw - 20px));
    background: var(--accent-dark); color: #fff; font-weight: 400; font-size: 12.5px; line-height: 1.5;
    text-align: left; white-space: normal; padding: 10px 13px; border-radius: 9px; border: 1px solid var(--accent);
    box-shadow: 0 8px 22px rgba(0,0,0,.30);
  }
  .cert-pop::before {
    content: ""; position: absolute; top: 100%; left: calc(50% + var(--arrow-shift, 0px));
    transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--accent-dark);
  }
  .cert-pop.below::before {
    top: auto; bottom: 100%; border-top-color: transparent; border-bottom-color: var(--accent-dark);
  }
  .cert.open .cert-pop { display: block; }
  .cert-pop b { color: #ffd98a; }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 4px;">
    <h1>Твоят личен анализ</h1>
    <p id="who">какво показа храната ти</p>
  </div>
</header>

<div class="wrap">
  <div class="loading" id="loading">Зарежда…</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SB_URL = "https://ankqnxqxrhonlffhxabn.supabase.co";
  var SB_KEY = "sb_publishable_4UGeheRP-noXzmxP5tuthg_dfeeMPDd";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var loading = document.getElementById("loading");
  var content = document.getElementById("content");
  var who = document.getElementById("who");

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }
  function showState(msg) {
    loading.style.display = "none";
    content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
  }

  var token = new URLSearchParams(location.search).get("t");
  if (!token) { showState("Липсва код в линка. Отвори линка, който получи."); return; }

  function render(data) {
    loading.style.display = "none";
    var cards = (data && data.cards) || [];
    if (data && data.name) who.textContent = data.name + " — какво показа храната ти";
    if (!cards.length) {
      content.innerHTML = '<div class="state">Анализът ти още се подготвя. Скоро тук ще има съдържание.</div>';
      return;
    }
    var html = '';
    cards.forEach(function (r) {
      var key = "a_" + r.sort;
      var ttl = String(r.title || "Виж");
      var cls = /Количество/.test(ttl) ? "l1"
              : /Макроси/.test(ttl) ? "l2"
              : /Качество/.test(ttl) ? "l3"
              : /Тайминг/.test(ttl) ? "l4"
              : /Добавки/.test(ttl) ? "l5"
              : "lx";
      html += '<div class="card ' + cls + '" data-key="' + esc(key) + '">';
      html += '<div class="t">' + esc(ttl) + "</div>";
      if (r.body) html += '<div class="body">' + r.body + "</div>";
      html += "</div>";
    });
    html += '<footer>cdb-Gym · личен анализ</footer>';
    content.innerHTML = html;

    // пренасяне на токена към Път 2 (start-pyramid-direct) → нататък към интейка
    [].slice.call(content.querySelectorAll('a[href*="start-pyramid-direct"]')).forEach(function (a) {
      a.href += (a.href.indexOf("?") >= 0 ? "&" : "?") + "t=" + encodeURIComponent(token);
    });

    // ── ПОВЕДЕНИЕ: bookends (увод/присъда извън пирамидата) + typewriter ──
    var allCards = [].slice.call(content.querySelectorAll(".card"));
    var lxCards = allCards.filter(function (c) { return c.classList.contains("lx"); });
    var introCard = lxCards.length ? lxCards[0] : null;
    var verdictCard = lxCards.length > 1 ? lxCards[lxCards.length - 1] : null;

    // Увод: перманентно отворена (леко сиво). Присъда: отваряема, призрачна.
    if (introCard) introCard.classList.add("intro", "open");
    if (verdictCard) verdictCard.classList.add("verdict");

    function docHeight() {
      return Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    }
    // Плавен скрол — еднакъв на Android и iOS. Ползва native smooth където се
    // поддържа (Android · iOS 15.4+ · десктоп); rAF fallback за стари iOS Safari,
    // където native scrollTo({behavior:"smooth"}) мълчи и не мърда.
    var supportsSmooth = ("scrollBehavior" in document.documentElement.style);
    var scrollRAF = null;
    function smoothScrollTo(targetY) {
      var maxY = docHeight() - window.innerHeight;
      var endY = Math.max(0, Math.min(targetY, maxY < 0 ? 0 : maxY));
      if (supportsSmooth) {
        try { window.scrollTo({ top: endY, behavior: "smooth" }); return; } catch (e) {}
      }
      var startY = window.pageYOffset || document.documentElement.scrollTop || 0;
      var dist = endY - startY, dur = 520;
      if (scrollRAF) cancelAnimationFrame(scrollRAF);
      if (Math.abs(dist) < 2) { window.scrollTo(0, endY); return; }
      var t0 = null;
      function ease(p) { return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; }
      function frame(ts) {
        if (t0 === null) t0 = ts;
        var p = Math.min(1, (ts - t0) / dur);
        window.scrollTo(0, Math.round(startY + dist * ease(p)));
        if (p < 1) scrollRAF = requestAnimationFrame(frame); else scrollRAF = null;
      }
      scrollRAF = requestAnimationFrame(frame);
    }
    function alignCardTop(el) {
      var top = el.getBoundingClientRect().top +
                (window.pageYOffset || document.documentElement.scrollTop || 0) - 10;
      smoothScrollTo(top < 0 ? 0 : top);
    }

    // ── Спейсър: гарантира, че заглавието на присъдата стига върха и ОСТАВА там ──
    function setSpacer() {
      var sp = document.getElementById("tw-spacer");
      if (sp) sp.style.height = "0px";              // нулирай за чисто мерене
      if (!verdictCard) return 0;
      var y = (window.pageYOffset || document.documentElement.scrollTop || 0);
      var vtop = verdictCard.getBoundingClientRect().top + y;
      var need = (vtop - 10 + window.innerHeight) - docHeight();
      if (need > 0) {
        if (!sp) { sp = document.createElement("div"); sp.id = "tw-spacer"; content.appendChild(sp); }
        sp.style.height = Math.ceil(need) + "px";
      }
      return vtop;
    }
    function clearSpacer() { var sp = document.getElementById("tw-spacer"); if (sp) sp.style.height = "0px"; }

    // ── Typewriter за тялото на карта-присъда (тръгва при отваряне) ──
    var TW_SPEED = 30;   // ms на буква
    var twNodes = null, twTimer = null, twStarted = false, twDone = false;

    function twPrepare() {                            // изчиства тялото ВЕДНАГА (мерим празно)
      if (twStarted || !verdictCard) return;
      twStarted = true;
      var bodyEl = verdictCard.querySelector(".body");
      if (!bodyEl) { twDone = true; return; }
      var walker = document.createTreeWalker(bodyEl, NodeFilter.SHOW_TEXT, null);
      twNodes = []; var n;
      while ((n = walker.nextNode())) { twNodes.push({ node: n, text: n.nodeValue }); n.nodeValue = ""; }
      verdictCard.classList.add("typing");
    }
    function twRun() {
      if (!twNodes) return;
      var i = 0, ci = 0;
      function step() {
        if (i >= twNodes.length) { verdictCard.classList.remove("typing"); twDone = true; twTimer = null; setSpacer(); return; }
        var cur = twNodes[i];
        if (/^\s*$/.test(cur.text)) { cur.node.nodeValue = cur.text; i++; ci = 0; step(); return; }
        if (ci < cur.text.length) {
          cur.node.nodeValue += cur.text.charAt(ci); ci++;
          twTimer = setTimeout(step, TW_SPEED);
        } else { i++; ci = 0; step(); }
      }
      step();
    }
    function twComplete() {                           // принт/PDF → пълен текст, без анимация
      if (twTimer) { clearTimeout(twTimer); twTimer = null; }
      twStarted = true;
      if (twNodes) twNodes.forEach(function (it) { it.node.nodeValue = it.text; });
      if (verdictCard) verdictCard.classList.remove("typing");
      twDone = true;
    }

    window.addEventListener("beforeprint", function () {
      if (verdictCard) { verdictCard.classList.add("open"); twComplete(); }
    });

    content.addEventListener("click", function (e) {
      if (e.target.closest(".cert")) return;
      if (e.target.closest(".body")) return;
      var card = e.target.closest(".card");
      if (!card) return;
      if (card === introCard) return;                 // увод: без тоглер
      card.classList.toggle("open");
      if (card === verdictCard) {
        if (!card.classList.contains("open")) { clearSpacer(); return; }
        var firstOpen = !twStarted;
        if (firstOpen) twPrepare();                   // изчисти тялото ПРЕДИ мерене
        var vtop = setSpacer();                       // резервирай място → заглавието горе
        smoothScrollTo(Math.max(0, vtop - 10));
        if (firstOpen) setTimeout(twRun, 550);        // след скрола → тръгва изписването
        return;
      }
      if (!card.classList.contains("open")) return;
      alignCardTop(card);
    });

    function placeCert(cert) {
      var pop = cert.querySelector(".cert-pop");
      if (!pop) return;
      var cr = cert.getBoundingClientRect(), pr = pop.getBoundingClientRect();
      var pad = 8, vw = document.documentElement.clientWidth;
      var center = cr.left + cr.width / 2;
      var left = center - pr.width / 2;
      if (left < pad) left = pad;
      if (left + pr.width > vw - pad) left = vw - pad - pr.width;
      pop.style.left = left + "px";
      var above = cr.top - pr.height - 8;
      if (above >= pad) { pop.style.top = above + "px"; pop.classList.remove("below"); }
      else { pop.style.top = (cr.bottom + 8) + "px"; pop.classList.add("below"); }
      pop.style.setProperty("--arrow-shift", (center - (left + pr.width / 2)) + "px");
    }
    var certs = [].slice.call(content.querySelectorAll(".cert"));
    function closeCerts(except) { certs.forEach(function (o) { if (o !== except) o.classList.remove("open"); }); }
    certs.forEach(function (cert) {
      cert.addEventListener("mouseenter", function () { closeCerts(cert); cert.classList.add("open"); placeCert(cert); });
      cert.addEventListener("mouseleave", function () { cert.classList.remove("open"); });
      cert.addEventListener("click", function (e) {
        e.stopPropagation();
        var wasOpen = cert.classList.contains("open");
        closeCerts(cert);
        if (!wasOpen) { cert.classList.add("open"); placeCert(cert); } else { cert.classList.remove("open"); }
      });
    });
    document.addEventListener("click", function () { closeCerts(null); });
    window.addEventListener("scroll", function () { closeCerts(null); }, true);
  }

  sb.rpc("get_analysis", { p_token: token }).then(function (res) {
    if (res.error) { showState("Възникна грешка при зареждането. Опитай по-късно."); return; }
    if (!res.data) { showState("Линкът е невалиден или вече не е активен."); return; }
    render(res.data);
  }, function () {
    showState("Няма връзка. Провери интернета и опитай пак.");
  });
})();
</script>
</body>
</html>
