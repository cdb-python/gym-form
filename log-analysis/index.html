<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Твоят анализ</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7886;
    --accent: #2e7d5b;
    --accent-dark: #235e45;
    --gold: #b8862f;
    --border: #d8dee5;
    --soft: #eef4f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    padding: 0 0 40px;
    overflow-x: hidden;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 22px 18px 18px;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; font-size: 15px; opacity: 0.92; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .intro {
    color: var(--muted);
    font-size: 14.5px;
    margin: 16px 2px 4px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0 0;
  }
  .card .t { font-weight: 700; font-size: 16px; margin: 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .card .t::after { content: "▸"; color: var(--accent); font-size: 14px; flex: none; }
  .card.open .t::after { content: "▾"; }
  .card .body { font-size: 15.5px; margin-top: 8px; display: none; overflow-x: auto; }
  .card.open .body { display: block; }
  .card .body p { margin: 0 0 8px; }
  .card .body p:last-child { margin-bottom: 0; }
  .card .body table { width: 100%; border-collapse: collapse; table-layout: fixed; margin: 8px 0; font-size: 13.5px; }
  .card .body th, .card .body td { border: 1px solid var(--border); padding: 6px 7px; text-align: left; word-break: break-word; vertical-align: top; }
  .card .body th { background: var(--soft); color: var(--accent-dark); }
  .card .body td:first-child, .card .body th:first-child { width: 40%; }
  .state {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 18px;
    margin: 22px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15.5px;
  }
  .loading { text-align: center; color: var(--muted); padding: 30px 0; }
  footer { text-align: center; color: var(--muted); font-size: 13px; margin: 22px 0 0; }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 4px;">
    <h1>Твоят анализ</h1>
    <p id="who">какво показа храна-логът ти</p>
  </div>
</header>

<div class="wrap">
  <div class="loading" id="loading">Зарежда…</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SB_URL = "https://ankqnxqxrhonlffhxabn.supabase.co";
  var SB_KEY = "sb_publishable_4UGeheRP-noXzmxP5tuthg_dfeeMPDd";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var loading = document.getElementById("loading");
  var content = document.getElementById("content");
  var who = document.getElementById("who");

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }
  function showState(msg) {
    loading.style.display = "none";
    content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
  }

  var token = new URLSearchParams(location.search).get("t");
  if (!token) { showState("Липсва код в линка. Отвори линка, който получи."); return; }

  function render(data) {
    loading.style.display = "none";
    var cards = (data && data.cards) || [];
    if (data && data.name) who.textContent = data.name + " — какво показа храна-логът ти";
    if (!cards.length) {
      content.innerHTML = '<div class="state">Анализът ти още се подготвя. Скоро тук ще има съдържание.</div>';
      return;
    }
    var OPEN_KEY = "analysis_open_" + token;
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem(OPEN_KEY)); } catch (e) {}
    var hasSaved = saved && typeof saved.length === "number";

    var html = '<p class="intro">Докосни всяка карта, за да я отвориш.</p>';
    cards.forEach(function (r, i) {
      var key = "a_" + r.sort;
      var isOpen = hasSaved ? (saved.indexOf(key) > -1) : (i === 0);
      html += '<div class="card' + (isOpen ? " open" : "") + '" data-key="' + esc(key) + '">';
      html += '<div class="t">' + esc(r.title || "Виж") + "</div>";
      if (r.body) html += '<div class="body">' + r.body + "</div>";
      html += "</div>";
    });
    html += '<footer>cdb-Gym · личен анализ</footer>';
    content.innerHTML = html;

    function saveOpen() {
      var keys = [];
      content.querySelectorAll(".card.open").forEach(function (c) { keys.push(c.dataset.key); });
      try { localStorage.setItem(OPEN_KEY, JSON.stringify(keys)); } catch (e) {}
    }
    if (!hasSaved) saveOpen();

    content.addEventListener("click", function (e) {
      if (e.target.closest(".body")) return;
      var card = e.target.closest(".card");
      if (card) { card.classList.toggle("open"); saveOpen(); }
    });
  }

  sb.rpc("get_analysis", { p_token: token }).then(function (res) {
    if (res.error) { showState("Възникна грешка при зареждането. Опитай по-късно."); return; }
    if (!res.data) { showState("Линкът е невалиден или вече не е активен."); return; }
    render(res.data);
  }, function () {
    showState("Няма връзка. Провери интернета и опитай пак.");
  });
})();
</script>
</body>
</html>
