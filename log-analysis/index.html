<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Твоят анализ</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7886;
    --accent: #8a5a00;
    --accent-dark: #6a531f;
    --gold: #b8862f;
    --border: #d8dee5;
    --soft: #fff8ec;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    padding: 0 0 40px;
    overflow-x: hidden;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 22px 18px 18px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; font-size: 15px; opacity: 0.92; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .intro {
    color: var(--muted);
    font-size: 14.5px;
    margin: 16px 2px 4px;
    text-align: center;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin: 12px 0 0;
    overflow: hidden;
  }
  .card .t {
    font-weight: 700; font-size: 16px; margin: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 16px; text-align: left; color: #fff; background: var(--accent);
  }
  .card .t::after { content: "+"; flex: none; color: #fff; font-size: 20px; font-weight: 700; }
  .card.open .t::after { content: "\2212"; }
  .card .body { font-size: 15.5px; padding: 14px 16px; display: none; overflow-x: auto; }
  .card.open .body { display: block; }
  .card.l1 .t { background: #c43d3d; }
  .card.l2 .t { background: #34376f; }
  .card.l3 .t { background: #245fb0; }
  .card.l4 .t { background: #129e90; }
  .card.l5 .t { background: #b8862f; }
  .card.lx .t { background: #fff8ec; color: #6a531f; }
  .card.lx .t::after { color: #6a531f; }
  .card.l1 { border-left: 5px solid #c43d3d; }
  .card.l2 { border-left: 5px solid #34376f; }
  .card.l3 { border-left: 5px solid #245fb0; }
  .card.l4 { border-left: 5px solid #129e90; }
  .card.l5 { border-left: 5px solid #b8862f; }
  .card.lx { border-left: 5px solid #8a5a00; }
  .card .body p { margin: 0 0 8px; }
  .card .body p:last-child { margin-bottom: 0; }
  .card .body table { width: 100%; border-collapse: collapse; table-layout: fixed; margin: 8px 0; font-size: 13.5px; }
  .card .body th, .card .body td { border: 1px solid var(--border); padding: 6px 7px; text-align: left; word-break: break-word; vertical-align: top; }
  .card .body th { background: var(--soft); color: var(--accent-dark); }
  .card .body td:first-child, .card .body th:first-child { width: 40%; }
  .state {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 18px;
    margin: 22px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15.5px;
  }
  .loading { text-align: center; color: var(--muted); padding: 30px 0; }
  footer { text-align: center; color: var(--muted); font-size: 13px; margin: 22px 0 0; }
  .exit { text-align: center; margin: 20px 0 0; }
  .exit p { color: var(--muted); font-size: 14px; margin: 0 0 10px; }
  .pdfbtn {
    display: inline-block; background: #fff; color: var(--accent);
    border: 1.5px solid var(--accent); border-radius: 11px;
    font-weight: 700; font-size: 15px; padding: 11px 18px; cursor: pointer;
  }
  .pdfbtn:active { background: var(--soft); }
  @media print {
    .no-print, .loading { display: none !important; }
    .card .body { display: block !important; }
    .card .t { cursor: default; break-after: avoid; }
    .card .t::after { content: "" !important; }
    .card { overflow: visible; border: none; border-radius: 0; box-shadow: none; margin: 0 0 12px; }
    .card .body { break-before: avoid; }
    .card .body table, .card .body tr { break-inside: avoid; }
    footer { break-inside: avoid; }
    body { padding: 0; font-size: 12pt; }
    header, .card .t, .card .body th {
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    a[href] { color: inherit; text-decoration: none; }
  }
  .cert { color: var(--accent); border-bottom: 1px dotted var(--accent); cursor: pointer; font-weight: 700; white-space: nowrap; }
  .cert-pop {
    display: none; position: fixed; z-index: 100;
    width: max-content; max-width: min(320px, calc(100vw - 20px));
    background: var(--accent-dark); color: #fff; font-weight: 400; font-size: 12.5px; line-height: 1.5;
    text-align: left; white-space: normal; padding: 10px 13px; border-radius: 9px; border: 1px solid var(--accent);
    box-shadow: 0 8px 22px rgba(0,0,0,.30);
  }
  .cert-pop::before {
    content: ""; position: absolute; top: 100%; left: calc(50% + var(--arrow-shift, 0px));
    transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--accent-dark);
  }
  .cert-pop.below::before {
    top: auto; bottom: 100%; border-top-color: transparent; border-bottom-color: var(--accent-dark);
  }
  .cert.open .cert-pop { display: block; }
  .cert-pop b { color: #ffd98a; }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 4px;">
    <h1>Твоят личен анализ</h1>
    <p id="who">какво показа храната ти</p>
  </div>
</header>

<div class="wrap">
  <div class="loading" id="loading">Зарежда…</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SB_URL = "https://ankqnxqxrhonlffhxabn.supabase.co";
  var SB_KEY = "sb_publishable_4UGeheRP-noXzmxP5tuthg_dfeeMPDd";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var loading = document.getElementById("loading");
  var content = document.getElementById("content");
  var who = document.getElementById("who");

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }
  function showState(msg) {
    loading.style.display = "none";
    content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
  }

  var token = new URLSearchParams(location.search).get("t");
  if (!token) { showState("Липсва код в линка. Отвори линка, който получи."); return; }

  function render(data) {
    loading.style.display = "none";
    var cards = (data && data.cards) || [];
    if (data && data.name) who.textContent = data.name + " — какво показа храната ти";
    if (!cards.length) {
      content.innerHTML = '<div class="state">Анализът ти още се подготвя. Скоро тук ще има съдържание.</div>';
      return;
    }
    var html = '';
    cards.forEach(function (r) {
      var key = "a_" + r.sort;
      var ttl = String(r.title || "Виж");
      var cls = /Количество/.test(ttl) ? "l1"
              : /Макроси/.test(ttl) ? "l2"
              : /Качество/.test(ttl) ? "l3"
              : /Тайминг/.test(ttl) ? "l4"
              : /Добавки/.test(ttl) ? "l5"
              : "lx";
      html += '<div class="card ' + cls + '" data-key="' + esc(key) + '">';
      html += '<div class="t">' + esc(ttl) + "</div>";
      if (r.body) html += '<div class="body">' + r.body + "</div>";
      html += "</div>";
    });
    html += '<footer>cdb-Gym · личен анализ</footer>';
    content.innerHTML = html;

    // пренасяне на токена към Път 2 (start-pyramid-direct) → нататък към интейка
    [].slice.call(content.querySelectorAll('a[href*="start-pyramid-direct"]')).forEach(function (a) {
      a.href += (a.href.indexOf("?") >= 0 ? "&" : "?") + "t=" + encodeURIComponent(token);
    });

    content.addEventListener("click", function (e) {
      if (e.target.closest(".cert")) return;
      if (e.target.closest(".body")) return;
      var card = e.target.closest(".card");
      if (card) { card.classList.toggle("open"); }
    });

    function placeCert(cert) {
      var pop = cert.querySelector(".cert-pop");
      if (!pop) return;
      var cr = cert.getBoundingClientRect(), pr = pop.getBoundingClientRect();
      var pad = 8, vw = document.documentElement.clientWidth;
      var center = cr.left + cr.width / 2;
      var left = center - pr.width / 2;
      if (left < pad) left = pad;
      if (left + pr.width > vw - pad) left = vw - pad - pr.width;
      pop.style.left = left + "px";
      var above = cr.top - pr.height - 8;
      if (above >= pad) { pop.style.top = above + "px"; pop.classList.remove("below"); }
      else { pop.style.top = (cr.bottom + 8) + "px"; pop.classList.add("below"); }
      pop.style.setProperty("--arrow-shift", (center - (left + pr.width / 2)) + "px");
    }
    var certs = [].slice.call(content.querySelectorAll(".cert"));
    function closeCerts(except) { certs.forEach(function (o) { if (o !== except) o.classList.remove("open"); }); }
    certs.forEach(function (cert) {
      cert.addEventListener("mouseenter", function () { closeCerts(cert); cert.classList.add("open"); placeCert(cert); });
      cert.addEventListener("mouseleave", function () { cert.classList.remove("open"); });
      cert.addEventListener("click", function (e) {
        e.stopPropagation();
        var wasOpen = cert.classList.contains("open");
        closeCerts(cert);
        if (!wasOpen) { cert.classList.add("open"); placeCert(cert); } else { cert.classList.remove("open"); }
      });
    });
    document.addEventListener("click", function () { closeCerts(null); });
    window.addEventListener("scroll", function () { closeCerts(null); }, true);
  }

  sb.rpc("get_analysis", { p_token: token }).then(function (res) {
    if (res.error) { showState("Възникна грешка при зареждането. Опитай по-късно."); return; }
    if (!res.data) { showState("Линкът е невалиден или вече не е активен."); return; }
    render(res.data);
  }, function () {
    showState("Няма връзка. Провери интернета и опитай пак.");
  });
})();
</script>
</body>
</html>
