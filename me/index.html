<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Личен дневник</title>
<!-- PWA: инсталируем на екрана (истински manifest); токенът се пази локално -->
<meta name="theme-color" content="#2e7d5b">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Дневник">
<script>
(function () {
  // iOS 16.4+ ползва manifest.start_url (БЕЗ токен) + отделно standalone хранилище от Safari →
  // токенът се губи („Липсва код"). Затова НЕ слагаме <link rel=manifest> в HTML-а; добавяме го
  // през JS САМО за НЕ-iOS (Android). На iOS без manifest → A2HS (apple-meta) закача иконата към
  // ТЕКУЩИЯ URL (с токена) → токенът оцелява. (Диагностика 06.07: iOS стартираше ?src=pwa без токен.)
  var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
              (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  if (!isIOS) {
    var lnk = document.createElement("link");
    lnk.rel = "manifest"; lnk.href = "manifest.webmanifest";
    document.head.appendChild(lnk);
  }
  // Токенът се пази локално → инсталираното приложение (start_url без токен) сам се връща на личния дневник.
  try {
    var t = new URLSearchParams(location.search).get("t");
    if (t) { localStorage.setItem("cdbgym_diary_token", t); }
    else {
      var saved = localStorage.getItem("cdbgym_diary_token");
      if (saved) { location.replace(location.pathname + "?t=" + saved); return; }
    }
  } catch (e) {}
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7886;
    --accent: #2e7d5b;
    --accent-dark: #235e45;
    --gold: #b8862f;
    --border: #d8dee5;
    --soft: #eef4f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    padding: 0 0 40px;
    overflow-x: hidden;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 22px 18px 18px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; font-size: 15px; opacity: 0.92; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .sec { margin: 20px 0 6px; }
  .sec h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent-dark);
    margin: 0 0 8px;
    padding-left: 2px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 0 0 12px;
  }
  .card .t { font-weight: 700; font-size: 16px; margin: 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .card .t::after { content: "▸"; color: var(--accent); font-size: 14px; flex: none; }
  .card.open .t::after { content: "▾"; }
  .card .date { font-size: 13px; color: var(--muted); font-weight: 600; margin: 0 0 4px; }
  .card .body { font-size: 15.5px; margin-top: 8px; display: none; overflow-x: auto; }
  .card.open .body { display: block; }
  .card .body p { margin: 0 0 8px; }
  .card .body p:last-child { margin-bottom: 0; }
  .card .body table { width: 100%; border-collapse: collapse; table-layout: fixed; margin: 8px 0; font-size: 13.5px; }
  .card .body th, .card .body td { border: 1px solid var(--border); padding: 6px 7px; text-align: left; word-break: break-word; vertical-align: top; }
  .card .body th { background: var(--soft); color: var(--accent-dark); }
  .card .body td:first-child, .card .body th:first-child { width: 40%; }
  .card .body details.fx { border: 1px solid var(--border); border-radius: 10px; background: #fff; margin: 8px 0; }
  .card .body details.fx > summary { list-style: none; cursor: pointer; padding: 12px 14px; font-weight: 700; font-size: 15px; color: var(--accent-dark); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .card .body details.fx > summary::-webkit-details-marker { display: none; }
  .card .body details.fx > summary::after { content: "+"; color: var(--accent); font-size: 20px; font-weight: 400; line-height: 1; flex: none; }
  .card .body details.fx[open] > summary { border-bottom: 1px solid var(--border); }
  .card .body details.fx[open] > summary::after { content: "\2212"; }
  .card .body details.fx > .fxb { padding: 11px 14px 13px; font-size: 15px; }
  .card .body details.fx > .fxb p:first-child { margin-top: 0; }
  .state {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 18px;
    margin: 22px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15.5px;
  }
  .loading { text-align: center; color: var(--muted); padding: 30px 0; }
  .lf label { display: block; font-weight: 600; font-size: 14px; margin: 10px 0 4px; }
  .lf input, .lf textarea { width: 100%; padding: 10px 11px; font-size: 16px; border: 1px solid var(--border); border-radius: 9px; font-family: inherit; color: var(--ink); background: #fff; }
  .lf textarea { min-height: 54px; resize: vertical; }
  .lf .row2 { display: flex; gap: 10px; }
  .lf .row2 > div { flex: 1; }
  .lf button { width: 100%; margin-top: 12px; padding: 13px; font-size: 16px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; }
  .lf button:active { background: var(--accent-dark); }
  .lf .ok { display: none; margin-top: 10px; padding: 10px 12px; background: #e6f4ec; border: 1px solid #b7dcc6; border-radius: 9px; color: var(--accent-dark); font-size: 14px; text-align: center; }
  .lf .ok.show { display: block; }
  .logitem { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14.5px; }
  .logitem:last-child { border-bottom: none; }
  .logitem .d { font-weight: 700; }
  .logitem .m { color: #6b7886; }
  .card.coachcard { border-left: 3px solid var(--accent); background: var(--soft); }
  .msgbanner { position: sticky; top: 0; z-index: 50; background: var(--gold); color: #fff; border-radius: 0 0 12px 12px; padding: 13px 14px; margin: 0 -14px 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .msgbanner b { font-size: 17px; }
  .logcard.hasreply:not(.open) { border-color: #e0821e; box-shadow: 0 0 0 2px rgba(224,130,30,0.30); background: #fff7ef; }
  .logcard .rbadge { display: inline-block; margin-left: 7px; padding: 1px 8px; border-radius: 999px; background: #e0821e; color: #fff; font-size: 11px; font-weight: 700; vertical-align: middle; }
  .lf details.meas { margin: 8px 0 2px; border-top: 1px solid var(--border); padding-top: 6px; }
  .lf details.meas summary { cursor: pointer; color: var(--accent); font-weight: 600; font-size: 14px; padding: 4px 0; list-style: none; }
  .lf details.meas summary::-webkit-details-marker { display: none; }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 4px;">
    <h1>Твоят дневник</h1>
    <p id="who">&nbsp;</p>
  </div>
</header>

<div class="wrap">
  <div class="loading" id="loading">Зарежда…</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SB_URL = "https://ankqnxqxrhonlffhxabn.supabase.co";
  var SB_KEY = "sb_publishable_4UGeheRP-noXzmxP5tuthg_dfeeMPDd";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var SECTIONS = [
    { key: "info", label: "Информация" },
    { key: "nutrition", label: "Хранителен режим" },
    { key: "training", label: "Тренировки" },
    { key: "supplements", label: "Добавки" },
    { key: "labs", label: "Изследвания" },
    { key: "instruction", label: "Указания" }
  ];

  var loading = document.getElementById("loading");
  var content = document.getElementById("content");
  var who = document.getElementById("who");

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }
  function fmtDate(s) {
    if (!s) return "";
    var p = String(s).split("-");
    return p.length === 3 ? (p[2] + "." + p[1] + "." + p[0]) : s;
  }
  function fmtTime(s) {
    if (!s) return "";
    try {
      return new Date(s).toLocaleTimeString("bg-BG", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Sofia" });
    } catch (e) { return ""; }
  }
  function showState(msg) {
    loading.style.display = "none";
    content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
  }
  function showMissingToken(storageKey) {
    var saved = "?"; try { saved = localStorage.getItem(storageKey) ? "да" : "не"; } catch (e) {}
    var standalone = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || navigator.standalone === true;
    var ios = /iPhone|iPad|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    loading.style.display = "none";
    content.innerHTML = '<div class="state">Липсва код в линка. Отвори линка, който получи.'
      + '<div style="margin-top:14px;padding:10px;border:1px dashed #d8dee5;border-radius:8px;font-size:11.5px;color:#6b7886;text-align:left;word-break:break-all;line-height:1.55;">'
      + '<b>Диагностика (за Chris):</b><br>URL: ' + esc(location.href)
      + '<br>Запазен код: ' + saved
      + '<br>Режим: ' + (standalone ? "приложение (standalone)" : "браузър")
      + '<br>iOS: ' + (ios ? "да" : "не") + '</div></div>';
  }

  function render(data) {
    loading.style.display = "none";
    if (data.name) who.textContent = data.name;
    var items = data.content || [];
    if (!items.length) {
      content.innerHTML = '<div class="state">Планът ти още се подготвя. Скоро тук ще има съдържание.</div>';
      return;
    }
    // Без персистенция: всеки рефреш връща default (само първата карта отворена) — реш. Chris 04.07.2026
    var html = "";
    var firstOpen = true;
    SECTIONS.forEach(function (sec) {
      var rows = items.filter(function (r) { return r.section === sec.key; });
      if (!rows.length) return;
      if (sec.key === "instruction") {
        rows.sort(function (a, b) { return (b.entry_date || "").localeCompare(a.entry_date || ""); });
      }
      html += '<div class="sec"><h2>' + esc(sec.label) + "</h2>";
      rows.forEach(function (r, i) {
        var key = sec.key + "_" + r.sort;
        var isOpen = firstOpen;
        firstOpen = false;
        html += '<div class="card' + (isOpen ? " open" : "") + '" data-key="' + key + '">';
        if (r.entry_date) html += '<div class="date">' + esc(fmtDate(r.entry_date)) + "</div>";
        html += '<div class="t">' + esc(r.title || "Виж") + "</div>";
        if (r.body) html += '<div class="body">' + r.body + "</div>";
        html += "</div>";
      });
      html += "</div>";
    });
    function logSummary(e) {
      var bits = [];
      function add(v, label, unit) { if (v != null && v !== "") bits.push(label + " " + v + unit); }
      add(e.weight, "тегло", " кг");
      add(e.neck, "врат", " см");
      add(e.chest, "гръд", " см");
      add(e.arm, "ръка", " см");
      add(e.waist, "талия", " см");
      add(e.hip, "ханш", " см");
      add(e.thigh, "бедро", " см");
      add(e.calf, "прасец", " см");
      return bits.join(" · ");
    }
    function notePreview(t) {
      t = String(t || "").replace(/\s+/g, " ").trim();
      return t.length > 50 ? t.slice(0, 50) + "…" : t;
    }
    function renderLogCard(e, idx) {
      if (e.kind === "coach") {
        var cwhen = fmtDate(e.entry_date) + (fmtTime(e.created_at) ? ", " + fmtTime(e.created_at) : "");
        var ckey = "log_" + (e.created_at || ("i" + idx));
        return '<div class="card logcard coachcard' + (idx === 0 ? " open" : "") + '" data-key="' + esc(ckey) + '">'
          + '<div class="date">' + esc(cwhen) + "</div>"
          + '<div class="t" style="color:#2f6f4f">Съобщение от Chris</div>'
          + '<div class="body">' + esc(e.note || "").replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#2f6f4f;font-weight:600;word-break:break-all">$1</a>').replace(/\n/g, "<br>") + "</div></div>";
      }
      var meas = logSummary(e);
      var note = e.note ? String(e.note) : "";
      var title = note ? notePreview(note) : (meas || "Запис");
      var when = fmtDate(e.entry_date) + (fmtTime(e.created_at) ? ", " + fmtTime(e.created_at) : "");
      var body;
      if (note) {
        body = (meas ? '<span class="m">' + esc(meas) + "</span><br>" : "") + esc(note).replace(/\n/g, "<br>");
      } else {
        body = '<span class="m">Само мерки — без бележка.</span>';
      }
      var reply = e.reply ? String(e.reply) : "";
      var replyUnread = reply && isUnreadTs(String(e.reply_at || ""));
      if (reply) {
        var rwhen = fmtDate(e.reply_at) + (fmtTime(e.reply_at) ? ", " + fmtTime(e.reply_at) : "");
        body += '<div style="margin-top:10px;padding:8px 11px;border-left:3px solid #2f6f4f;background:#eef4f0;border-radius:6px">'
          + '<div style="color:#2f6f4f;font-weight:600;font-size:13px;margin-bottom:3px">Отговор от Chris' + (rwhen ? " · " + esc(rwhen) : "") + "</div>"
          + '<div style="font-size:14px">' + esc(reply).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#2f6f4f;font-weight:600;word-break:break-all">$1</a>').replace(/\n/g, "<br>") + "</div></div>";
      }
      var key = "log_" + (e.created_at || ("i" + idx));
      return '<div class="card logcard' + (idx === 0 ? " open" : "") + (replyUnread ? " hasreply" : "") + '" data-key="' + esc(key) + '">'
        + '<div class="date">' + esc(when) + "</div>"
        + '<div class="t">' + esc(title) + (replyUnread ? '<span class="rbadge">отговор</span>' : "") + "</div>"
        + '<div class="body">' + body + "</div></div>";
    }
    function renderLogList(arr) {
      if (!arr || !arr.length) return '<p style="color:#6b7886;font-size:14px">Още няма записи.</p>';
      return arr.map(renderLogCard).join("");
    }
    var coachMsgs = (data.log || []).filter(function (e) { return e.kind === "coach"; });
    var SEEN_KEY = "diary_seen_coach_" + token;
    var seenTs = null; try { seenTs = localStorage.getItem(SEEN_KEY); } catch (e) {}
    // последна КЛИЕНТСКА активност — ако е писала СЛЕД съобщението, видяла го е (robust кросс-устройство)
    var lastClientAt = "";
    (data.log || []).forEach(function (e) { if (e.kind !== "coach") { var c = String(e.created_at || ""); if (c > lastClientAt) lastClientAt = c; } });
    function isUnreadTs(ts) { return !!(ts && ts > lastClientAt && (!seenTs || ts > seenTs)); }
    var logHtml = '<div class="sec"><h2>Моят прогрес</h2>'
      + '<div class="card open" data-key="log_form"><div class="t">Впиши днешното</div><div class="body lf">'
      + '<p style="color:#6b7886;font-size:13px;margin:0 0 6px">По желание — попълни каквото следиш. Датата се добавя автоматично.</p>'
      + '<label>Тегло (кг)</label><input type="number" id="lg_weight" inputmode="decimal">'
      + '<details class="meas"><summary>+ Обиколки (см) — по желание</summary>'
      + '<div class="row2"><div><label>Врат</label><input type="number" id="lg_neck" inputmode="decimal"></div>'
      + '<div><label>Гръд</label><input type="number" id="lg_chest" inputmode="decimal"></div></div>'
      + '<div class="row2"><div><label>Ръка (бицепс)</label><input type="number" id="lg_arm" inputmode="decimal"></div>'
      + '<div><label>Талия</label><input type="number" id="lg_waist" inputmode="decimal"></div></div>'
      + '<div class="row2"><div><label>Ханш</label><input type="number" id="lg_hip" inputmode="decimal"></div>'
      + '<div><label>Бедро</label><input type="number" id="lg_thigh" inputmode="decimal"></div></div>'
      + '<div class="row2"><div><label>Прасец</label><input type="number" id="lg_calf" inputmode="decimal"></div>'
      + '<div></div></div>'
      + '</details>'
      + '<label>Бележка — как се чувстваш или въпрос</label><textarea id="lg_note"></textarea>'
      + '<button type="button" id="lgBtn">Запиши</button>'
      + '<div class="ok" id="lgOk">Записано. Благодаря!</div></div></div></div>'
      + '<div class="sec"><h2>Минали записи</h2><div id="logList">'
      + renderLogList(data.log || []) + "</div></div>";
    // всички съобщения от Chris = coach карти + inline отговори; банерът брои непрочетените
    var msgEvents = [];
    coachMsgs.forEach(function (m) { if (m.created_at) msgEvents.push(String(m.created_at)); });
    (data.log || []).forEach(function (e) { if (e.kind !== "coach" && e.reply && e.reply_at) msgEvents.push(String(e.reply_at)); });
    var unread = msgEvents.filter(isUnreadTs);
    var bannerHtml = "";
    if (unread.length) {
      var nb = unread.length;
      bannerHtml = '<div class="msgbanner" id="msgBanner">✉ Имате <b>' + nb + '</b> '
        + (nb === 1 ? "ново съобщение" : "нови съобщения") + ' от Chris — прочети най-долу ↓</div>';
    }
    content.innerHTML = bannerHtml + html + logHtml;

    var msgBanner = document.getElementById("msgBanner");
    if (msgBanner) {
      var newestMsg = msgEvents.reduce(function (a, ts) { return (ts && (!a || ts > a)) ? ts : a; }, null);
      msgBanner.addEventListener("click", function () {
        try { localStorage.setItem(SEEN_KEY, newestMsg); } catch (e) {}
        msgBanner.style.display = "none";
        var ll = document.getElementById("logList");
        if (ll) ll.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    var lgBtn = document.getElementById("lgBtn");
    if (lgBtn) lgBtn.addEventListener("click", function () {
      function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ""; }
      function num(id) { var v = val(id); return v ? parseFloat(v) : null; }
      var fields = { weight: "lg_weight", waist: "lg_waist", hip: "lg_hip", neck: "lg_neck", chest: "lg_chest", arm: "lg_arm", thigh: "lg_thigh", calf: "lg_calf" };
      var nt = val("lg_note");
      var ok = document.getElementById("lgOk");
      var rec = { note: nt || null };
      var any = !!nt, k;
      for (k in fields) { var n = num(fields[k]); rec[k] = n; if (n != null) any = true; }
      if (!any) { ok.textContent = "Попълни поне едно поле."; ok.classList.add("show"); return; }
      lgBtn.disabled = true; lgBtn.textContent = "Записване…";
      sb.rpc("add_log_entry", { p_token: token, p_weight: rec.weight, p_waist: rec.waist, p_hip: rec.hip, p_note: rec.note, p_neck: rec.neck, p_chest: rec.chest, p_arm: rec.arm, p_thigh: rec.thigh, p_calf: rec.calf })
        .then(function (res) {
          if (res.error || res.data === false) throw (res.error || new Error("fail"));
          ok.textContent = "Записано. Благодаря!"; ok.classList.add("show");
          var list = document.getElementById("logList");
          if (!list.querySelector(".logcard")) list.innerHTML = "";
          rec.entry_date = new Date().toISOString().slice(0, 10);
          rec.created_at = new Date().toISOString();
          list.insertAdjacentHTML("afterbegin", renderLogCard(rec, 0));
          for (k in fields) { var el = document.getElementById(fields[k]); if (el) el.value = ""; }
          document.getElementById("lg_note").value = "";
          lgBtn.disabled = false; lgBtn.textContent = "Запиши";
        })
        .catch(function () { lgBtn.disabled = false; lgBtn.textContent = "Запиши"; ok.textContent = "Неуспешно. Опитай пак."; ok.classList.add("show"); });
    });

    content.addEventListener("click", function (e) {
      if (e.target.closest(".body")) return;
      var card = e.target.closest(".card");
      if (card) { card.classList.toggle("open"); }
    });

    var sy = parseInt(sessionStorage.getItem("diary_scroll_" + token), 10);
    if (sy > 0) {
      var doRestore = function () { window.scrollTo(0, sy); };
      void document.body.offsetHeight;
      doRestore();
      setTimeout(doRestore, 80);
      setTimeout(doRestore, 250);
    }
  }

  var token = new URLSearchParams(location.search).get("t");
  if (!token) { showMissingToken("cdbgym_diary_token"); return; }

  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  var scrollT;
  window.addEventListener("scroll", function () {
    clearTimeout(scrollT);
    scrollT = setTimeout(function () {
      try { sessionStorage.setItem("diary_scroll_" + token, String(window.scrollY)); } catch (e) {}
    }, 120);
  });

  sb.rpc("get_client_diary", { p_token: token }).then(function (res) {
    if (res.error) { showState("Възникна грешка при зареждането. Опитай по-късно."); return; }
    if (!res.data) { showState("Линкът е невалиден или вече не е активен."); return; }
    render(res.data);
  }, function () {
    showState("Няма връзка. Провери интернета и опитай пак.");
  });
})();
</script>
</body>
</html>
