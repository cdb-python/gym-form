<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Личен дневник</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1c2733;
    --muted: #6b7886;
    --accent: #2e7d5b;
    --accent-dark: #235e45;
    --border: #d8dee5;
    --soft: #eef4f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    padding: 0 0 40px;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 22px 18px 18px;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; font-size: 15px; opacity: 0.92; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .sec { margin: 20px 0 6px; }
  .sec h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent-dark);
    margin: 0 0 8px;
    padding-left: 2px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 0 0 12px;
  }
  .card .t { font-weight: 700; font-size: 16px; margin: 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .card .t::after { content: "▸"; color: var(--accent); font-size: 14px; flex: none; }
  .card.open .t::after { content: "▾"; }
  .card .date { font-size: 13px; color: var(--muted); font-weight: 600; margin: 0 0 4px; }
  .card .body { font-size: 15.5px; margin-top: 8px; display: none; }
  .card.open .body { display: block; }
  .card .body p { margin: 0 0 8px; }
  .card .body p:last-child { margin-bottom: 0; }
  .card .body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14.5px; }
  .card .body th, .card .body td { border: 1px solid var(--border); padding: 7px 9px; text-align: left; }
  .card .body th { background: var(--soft); color: var(--accent-dark); }
  .state {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 18px;
    margin: 22px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15.5px;
  }
  .loading { text-align: center; color: var(--muted); padding: 30px 0; }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 4px;">
    <h1>Твоят дневник</h1>
    <p id="who">&nbsp;</p>
  </div>
</header>

<div class="wrap">
  <div class="loading" id="loading">Зарежда…</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SB_URL = "https://ankqnxqxrhonlffhxabn.supabase.co";
  var SB_KEY = "sb_publishable_4UGeheRP-noXzmxP5tuthg_dfeeMPDd";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var SECTIONS = [
    { key: "nutrition", label: "Хранителен режим" },
    { key: "training", label: "Тренировки" },
    { key: "supplements", label: "Добавки" },
    { key: "info", label: "Информация" },
    { key: "instruction", label: "Указания" }
  ];

  var loading = document.getElementById("loading");
  var content = document.getElementById("content");
  var who = document.getElementById("who");

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }
  function fmtDate(s) {
    if (!s) return "";
    var p = String(s).split("-");
    return p.length === 3 ? (p[2] + "." + p[1] + "." + p[0]) : s;
  }
  function showState(msg) {
    loading.style.display = "none";
    content.innerHTML = '<div class="state">' + esc(msg) + "</div>";
  }

  function render(data) {
    loading.style.display = "none";
    if (data.name) who.textContent = data.name;
    var items = data.content || [];
    if (!items.length) {
      content.innerHTML = '<div class="state">Планът ти още се подготвя. Скоро тук ще има съдържание.</div>';
      return;
    }
    var html = "";
    SECTIONS.forEach(function (sec) {
      var rows = items.filter(function (r) { return r.section === sec.key; });
      if (!rows.length) return;
      if (sec.key === "instruction") {
        rows.sort(function (a, b) { return (b.entry_date || "").localeCompare(a.entry_date || ""); });
      }
      html += '<div class="sec"><h2>' + esc(sec.label) + "</h2>";
      rows.forEach(function (r, i) {
        html += '<div class="card' + (i === 0 ? " open" : "") + '">';
        if (r.entry_date) html += '<div class="date">' + esc(fmtDate(r.entry_date)) + "</div>";
        html += '<div class="t">' + esc(r.title || "Виж") + "</div>";
        if (r.body) html += '<div class="body">' + r.body + "</div>";
        html += "</div>";
      });
      html += "</div>";
    });
    content.innerHTML = html;
    content.addEventListener("click", function (e) {
      var t = e.target.closest(".t");
      if (t && content.contains(t)) t.parentNode.classList.toggle("open");
    });
  }

  var token = new URLSearchParams(location.search).get("t");
  if (!token) { showState("Липсва код в линка. Отвори линка, който получи."); return; }

  sb.rpc("get_client_diary", { p_token: token }).then(function (res) {
    if (res.error) { showState("Възникна грешка при зареждането. Опитай по-късно."); return; }
    if (!res.data) { showState("Линкът е невалиден или вече не е активен."); return; }
    render(res.data);
  }, function () {
    showState("Няма връзка. Провери интернета и опитай пак.");
  });
})();
</script>
</body>
</html>
